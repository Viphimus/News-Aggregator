<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ source_name }} - {{ category_name }}</title>
</head>
<body>
    <h1>{{ source_name }} - {{ category_name }}</h1>

    {% if articles %}
        <ul>
            {% for article in articles %}
                <li>
                    <a href="{{ article.link }}" target="_blank">{{ article.title }}</a>
                </li>
            {% endfor %}
        </ul>
    {% else %}
        <p>No articles found for this source.</p>
    {% endif %}

    <a href="{{ url_for('home') }}">Back to sources</a>
</body>
</html>
