<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Top Headlines</title>
</head>
<body>
    <h1>Top Headlines from All Sources</h1>

    {% if headlines %}
        <ul>
            {% for item in headlines %}
                <li>
                    <strong>{{ item.source }}</strong> - {{ item.category }}:
                    <a href="{{ item.link }}" target="_blank">{{ item.title }}</a>
                </li>
            {% endfor %}
        </ul>
    {% else %}
        <p>No headlines available.</p>
    {% endif %}

    <a href="{{ url_for('home') }}">Back to sources</a>
</body>
</html>
